name: blackliveryrider
description: "BlackLivery Rider - Premium ride-hailing app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10
  google_fonts: ^6.1.0
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  permission_handler: ^11.1.0
  dio: ^5.9.1
  flutter_secure_storage: ^10.0.0
  provider: ^6.1.5+1
  intl: ^0.20.2
  geocoding: ^4.0.0
  firebase_core: ^4.4.0
  firebase_app_check: ^0.4.1+4
  firebase_auth: ^6.1.4
  firebase_storage: ^13.0.3
  firebase_messaging: ^16.1.1
  image_picker: ^1.2.0
  flutter_local_notifications: ^18.0.1
  socket_io_client: ^3.1.4
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.2
  share_plus: ^10.1.4
  connectivity_plus: ^6.1.4
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.3
  local_auth: ^2.3.0
  webview_flutter: ^4.10.0
  uuid: ^4.5.3
  firebase_crashlytics: ^5.0.7
  go_router: ^14.6.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app-icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/app-icon.png"

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/