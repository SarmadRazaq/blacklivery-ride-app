name: Rider App CI

on:
  push:
    branches: [main, develop]
    paths: ['mobile/rider/blacklivery/blackliveryrider/**']
  pull_request:
    branches: [main]
    paths: ['mobile/rider/blacklivery/blackliveryrider/**']

defaults:
  run:
    working-directory: mobile/rider/blacklivery/blackliveryrider

jobs:
  analyze-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

      - name: Build APK (release)
        run: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/symbols \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }} \
            --dart-define=GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rider-apk
          path: mobile/rider/blacklivery/blackliveryrider/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: rider-debug-symbols
          path: mobile/rider/blacklivery/blackliveryrider/build/symbols/
